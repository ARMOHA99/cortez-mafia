<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>CORTEZ SYSTEM</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; text-align: center; }
        .box { border: 1px solid #00ff41; padding: 20px; width: 320px; margin: 50px auto; }
        button { background: #000; color: #00ff41; border: 1px solid #00ff41; padding: 10px; margin: 5px; cursor: pointer; }
        #emergency-banner { display: none; background: #ff003c; color: #fff; padding: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="auth" class="box">
        <h2>CORTEZ LOGIN</h2>
        <input id="u" placeholder="User"><br>
        <input type="password" id="p" placeholder="Pass"><br>
        <button onclick="login()">LOGIN</button>
    </div>
    <div id="app" style="display:none;">
        <div id="emergency-banner">🚨 ALERT: EMERGENCY PROTOCOL ACTIVE 🚨</div>
        <button onclick="toggleDuty()">[ PUNCH IN/OUT ]</button>
        <button onclick="em()" style="border-color:red; color:red;">[ EMERGENCY ]</button>
        <button onclick="resetAll()" style="border-color:yellow; color:yellow;">[ ARCHIVE & RESET ]</button>
        <table id="tbl" style="margin:20px auto; width:80%;"><thead><tr><th>USER</th><th>HOURS</th><th>STATUS</th></tr></thead><tbody></tbody></table>
    </div>
    <script>
        const socket = io();
        async function login() {
            const u = document.getElementById('u').value;
            const res = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username: u, password: document.getElementById('p').value}) });
            if(res.ok) { localStorage.setItem('user', u); document.getElementById('auth').style.display='none'; document.getElementById('app').style.display='block'; fetchStats(); }
        }
        function toggleDuty() { socket.emit('toggleDuty', {username: localStorage.getItem('user')}); }
        function em() { socket.emit('emergency', 'استنفار!'); }
        async function resetAll() { if(confirm('تأكيد الأرشفة والتصفير؟')) await fetch('/api/admin/reset', {method:'POST'}); }
        socket.on('update', fetchStats);
        socket.on('alert', () => { document.getElementById('emergency-banner').style.display='block'; setTimeout(() => document.getElementById('emergency-banner').style.display='none', 10000); });
        async function fetchStats() {
            const d = await (await fetch('/api/stats')).json();
            document.querySelector('tbody').innerHTML = d.map(u => `<tr><td>${u.username}</td><td>${Math.round(u.weekly_hours/60)}</td><td>${u.duty_status}</td></tr>`).join('');
        }
    </script>
</body>
</html>
