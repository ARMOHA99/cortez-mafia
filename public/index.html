<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>CORTEZ SYSTEM v5.7</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --primary: #00ff66; --bg-color: #050505; --danger: #ff0033; }
        body { background: var(--bg-color); color: var(--primary); font-family: 'Courier New', monospace; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #matrix-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.2; }
        .main-box { border: 1px solid var(--primary); padding: 30px; background: #000; width: 400px; box-shadow: 0 0 20px var(--primary); text-align: center; }
        .emergency-mode { animation: pulse 1s infinite alternate; border: 5px solid var(--danger) !important; box-shadow: 0 0 50px var(--danger) !important; }
        @keyframes pulse { from { background: #330000; } to { background: #ff000022; } }
        button { background: transparent; border: 1px solid var(--primary); color: var(--primary); padding: 12px; width: 100%; cursor: pointer; font-family: inherit; margin-top: 10px; }
        button:hover { background: var(--primary); color: #000; }
        input { background: #111; border: 1px solid #333; color: var(--primary); width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
    </style>
</head>
<body>
    <canvas id="matrix-bg"></canvas>
    <div id="app" class="main-box">
        <h2>// CORTEZ_SYSTEM_V5.7</h2>
        <div id="login-view">
            <input type="text" id="user" placeholder="اسم المستخدم">
            <input type="password" id="pass" placeholder="كلمة المرور">
            <button onclick="login()">[ INITIALIZE ]</button>
        </div>
        <div id="app-view" style="display:none;">
            <button id="btn-emergency" style="border-color:var(--danger); color:var(--danger);" onclick="toggleEmergency()">[ 🚨 EMERGENCY MODE ]</button>
            <div id="logs-container" style="margin-top:20px; text-align:right; font-size: 0.7rem;"></div>
        </div>
    </div>

    <script>
        const socket = io();
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width/20)).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0F0';
            drops.forEach((y, i) => {
                ctx.fillText(String.fromCharCode(Math.random()*128), i*20, y*20);
                if(y*20 > canvas.height) drops[i] = 0; else drops[i]++;
            });
        }
        setInterval(draw, 50);

        async function login() {
            const username = document.getElementById('user').value;
            const password = document.getElementById('pass').value;
            const res = await fetch('/api/auth/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username, password}) });
            if(res.ok) {
                document.getElementById('login-view').style.display = 'none';
                document.getElementById('app-view').style.display = 'block';
            } else alert("Error");
        }

        function toggleEmergency() {
            const app = document.getElementById('app');
            app.classList.toggle('emergency-mode');
            socket.emit('emergencyAlert', { status: app.classList.contains('emergency-mode') });
        }

        socket.on('emergencyAlert', (data) => {
            if(data.status) document.getElementById('app').classList.add('emergency-mode');
            else document.getElementById('app').classList.remove('emergency-mode');
        });
    </script>
</body>
</html>
