<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>[ CORTEZ SYSTEM v6.0 ]</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #00ff66; --bg-color: #050505; --panel-bg: #0d0d0d; --danger: #ff3333; --warning: #ffaa00; --text: #e0e0e0; }
        body { background: var(--bg-color); color: var(--text); font-family: 'Courier New', monospace; margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; }
        
        button { padding: 10px; background: transparent; border: 1px solid var(--primary); color: var(--primary); font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover:not(:disabled) { background: var(--primary); color: #000; }
        button:disabled { border-color: #333; color: #555; cursor: not-allowed; }
        .btn-danger { border-color: var(--danger); color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: #000; }
        .btn-warning { border-color: var(--warning); color: var(--warning); }
        .btn-warning:hover { background: var(--warning); color: #000; }

        .sidebar { width: 280px; background: rgba(8,8,8,0.9); border-left: 1px solid #222; padding: 20px; display: flex; flex-direction: column; }
        .menu-btn { background: none; border: none; color: #666; text-align: right; padding: 12px; cursor: pointer; border-bottom: 1px solid #111; width: 100%; }
        .menu-btn.active, .menu-btn:hover { color: var(--primary); }
        .main-content { flex-grow: 1; padding: 30px; overflow-y: auto; width: calc(100% - 280px); }
        .view-panel { display: none; } .view-panel.active { display: block; }
        
        /* Shop Styles */
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .item-card { background: #0a0a0a; border: 1px solid #222; padding: 15px; text-align: center; position: relative; }
        .item-card.out-of-stock { opacity: 0.5; filter: grayscale(100%); }
        .item-card img { width: 100%; height: 130px; object-fit: cover; border-bottom: 1px solid #222; margin-bottom: 10px; }
        .qty-controls { display: flex; justify-content: center; align-items: center; gap: 10px; margin: 10px 0; }
        .qty-controls button { padding: 2px 10px; font-size: 1.2rem; border-color:#555; color:#fff;}
        .admin-controls { margin-top: 10px; display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; }
        .admin-controls button { font-size: 0.7rem; padding: 5px; width: 45%; }
        
        /* Cart Styles */
        .cart-box { background: #111; border: 1px solid var(--primary); padding: 20px; margin-top: 20px; }
        .cart-item { display: flex; justify-content: space-between; border-bottom: 1px dashed #333; padding: 10px 0; }
        
        /* Bon / PDF Styles (Hidden from screen) */
        #invoice-template { display: none; padding: 40px; background: #fff; color: #000; font-family: 'Courier New', monospace; direction: ltr; }
        .invoice-header { text-align: center; border-bottom: 3px solid #000; padding-bottom: 20px; margin-bottom: 20px; }
        .invoice-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .invoice-table th, .invoice-table td { border: 1px solid #000; padding: 10px; text-align: left; }
    </style>
</head>
<body>
    <!-- (شاشة تسجيل الدخول مخفية اختصاراً، افترض أنها موجودة مثل الكود السابق) -->
    
    <div id="app-screen" style="display:flex; width:100%;">
        <div class="sidebar">
            <h3 style="color:var(--primary)">CORTEZ SYSTEM</h3>
            <div style="color:#fff; margin-bottom: 20px;">القائد: <span id="user-display"></span> <br><span id="role-display" style="color:gold;"></span></div>
            <button class="menu-btn active" onclick="changeTab('panel-shop', this)">🛒 المتجر و المخزن</button>
            <button class="menu-btn" style="color:var(--danger); margin-top:auto;" onclick="logout()">🚪 خروج</button>
        </div>

        <div class="main-content">
            <div id="panel-shop" class="view-panel active">
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #333; padding-bottom:10px;">
                    <h2>🛒 المستودع السري لعائلة كورتيز</h2>
                    <div id="treasury-box" style="display:none; text-align:left;">
                        <span style="background:#111; padding:10px; border:1px solid gold; color:gold; font-weight:bold;">💰 الخزينة: <span id="treasury-balance">0</span>$</span>
                        <button class="btn-danger" style="margin-right:10px;" onclick="resetTreasury()">🔄 تصفير الخزينة (غسيل)</button>
                    </div>
                </div>

                <div id="add-item-box" style="display:none; background:#111; padding:15px; margin-top:20px; border:1px solid #555;">
                    <h3>➕ إضافة منتج</h3>
                    <input type="text" id="itm-name" placeholder="اسم الآيتم"> <input type="number" id="itm-price" placeholder="السعر"> <input type="text" id="itm-img" placeholder="رابط الصورة">
                    <button onclick="addItem()">إضافة للسوق</button>
                </div>

                <div style="display:flex; gap:20px; margin-top:20px;">
                    <!-- المنتجات -->
                    <div style="flex:3;">
                        <div id="shop-items-container" class="shop-grid"></div>
                    </div>
                    
                    <!-- السلة للمشترين -->
                    <div style="flex:1;">
                        <div class="cart-box">
                            <h3 style="margin-top:0;">🛒 سلة المعدات</h3>
                            <div id="cart-items"></div>
                            <h3 style="color:gold; text-align:left;">الإجمالي: <span id="cart-total">0</span>$</h3>
                            <button onclick="checkoutCart()" style="width:100%; margin-top:10px;">💵 تأكيد الطلب واستخراج الوصل</button>
                        </div>
                    </div>
                </div>

                <!-- اللوج الخاص بالإدارة -->
                <div id="admin-orders-box" style="display:none; margin-top:30px;">
                    <h3 style="color:var(--warning); border-bottom:1px solid #333; padding-bottom:10px;">📦 سجل الطلبات (Logs)</h3>
                    <div id="orders-list-container"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Template for PDF Bon -->
    <div id="invoice-container" style="position: absolute; left: -9999px;">
        <div id="invoice-template">
            <div class="invoice-header">
                <h1 style="margin:0;">CORTEZ FAMILY</h1>
                <p style="margin:5px 0;">Official Syndicate Receipt</p>
                <p id="inv-date"></p>
            </div>
            <p><b>Client:</b> <span id="inv-user"></span></p>
            <p><b>Status:</b> PENDING PAYMENT (IN-CITY)</p>
            <table class="invoice-table">
                <thead><tr><th>ITEM</th><th>QTY</th><th>PRICE</th><th>SUBTOTAL</th></tr></thead>
                <tbody id="inv-tbody"></tbody>
            </table>
            <h2 style="text-align:right; margin-top:20px;">TOTAL: $<span id="inv-total"></span></h2>
            <p style="text-align:center; margin-top:40px; font-size:0.8rem; color:#555;">No refunds. Blood in, Blood out.</p>
        </div>
    </div>

    <script>
        const socket = io();
        let userToken = "YOUR_LOGIN_TOKEN_LOGIC"; // افترض أن اللوجن شغال
        let userData = { username: "DonMoha", role: "Don" }; // للتجربة
        let shopData = [];
        let cart = {}; // { item_id: quantity }

        // تهيئة الواجهة
        document.getElementById('user-display').innerText = userData.username;
        document.getElementById('role-display').innerText = userData.role;
        
        if(['Don', 'Business_Manager', 'Chef_Braquage'].includes(userData.role)) {
            document.getElementById('treasury-box').style.display = 'block';
            document.getElementById('add-item-box').style.display = 'block';
            document.getElementById('admin-orders-box').style.display = 'block';
        }

        // --- دوال المنتجات ---
        async function fetchShopItems() {
            const res = await fetch('/api/shop/items');
            shopData = await res.json(); renderShop();
        }

        function renderShop() {
            let html = "";
            const isAdmin = ['Don', 'Business_Manager', 'Chef_Braquage'].includes(userData.role);
            
            shopData.forEach(item => {
                const stockClass = item.in_stock ? "" : "out-of-stock";
                const stockText = item.in_stock ? `<span style="color:var(--primary)">متوفر</span>` : `<span style="color:var(--danger)">Out of Stock</span>`;
                
                let adminBtns = isAdmin ? `
                    <div class="admin-controls">
                        <button onclick="editItem('${item._id}')">تعديل</button>
                        <button onclick="toggleStock('${item._id}')">${item.in_stock ? 'نفاذ' : 'توفير'}</button>
                        <button class="btn-danger" onclick="deleteItem('${item._id}')">حذف</button>
                    </div>` : "";

                html += `<div class="item-card ${stockClass}">
                    <img src="${item.image_url}">
                    <h4>${item.name}</h4>
                    <p style="color:gold;">${item.price} $</p>
                    <p style="font-size:0.8rem">${stockText}</p>
                    ${item.in_stock ? `
                    <div class="qty-controls">
                        <button onclick="updateCart('${item._id}', -1)">-</button>
                        <span id="qty-${item._id}">${cart[item._id] || 0}</span>
                        <button onclick="updateCart('${item._id}', 1)">+</button>
                    </div>` : ''}
                    ${adminBtns}
                </div>`;
            });
            document.getElementById('shop-items-container').innerHTML = html;
        }

        // --- دوال السلة ---
        function updateCart(itemId, change) {
            if(!cart[itemId]) cart[itemId] = 0;
            cart[itemId] += change;
            if(cart[itemId] <= 0) delete cart[itemId];
            renderShop(); renderCart();
        }

        function renderCart() {
            let html = ""; let total = 0;
            for(const [id, qty] of Object.entries(cart)) {
                const item = shopData.find(i => i._id === id);
                if(item) {
                    const subtotal = item.price * qty; total += subtotal;
                    html += `<div class="cart-item"><span>${item.name} x${qty}</span> <span>${subtotal}$</span></div>`;
                }
            }
            document.getElementById('cart-items').innerHTML = html || "<p style='color:#555;'>السلة فارغة</p>";
            document.getElementById('cart-total').innerText = total;
        }

        async function checkoutCart() {
            if(Object.keys(cart).length === 0) return alert("السلة فارغة!");
            const cartArr = Object.keys(cart).map(id => ({ item_id: id, quantity: cart[id] }));
            
            const res = await fetch('/api/shop/checkout', { method: 'POST', headers: { 'Content-Type':'application/json', 'Authorization': `Bearer ${userToken}`}, body: JSON.stringify({ cart: cartArr }) });
            const data = await res.json();
            
            if(res.status === 200) {
                alert("تم الطلب! سيتم تحميل وصل الدفع الآن لتسليمه للمسؤول.");
                generatePDFBon(data.order_id, data.items, data.total_price);
                cart = {}; renderCart(); renderShop();
            } else { alert(data.error); }
        }

        // --- توليد وصل PDF ---
        function generatePDFBon(orderId, items, total) {
            document.getElementById('inv-date').innerText = new Date().toLocaleString();
            document.getElementById('inv-user').innerText = userData.username;
            document.getElementById('inv-total').innerText = total;
            
            let tbody = "";
            items.forEach(i => { tbody += `<tr><td>${i.item_name}</td><td>${i.quantity}</td><td>$${i.price}</td><td>$${i.price * i.quantity}</td></tr>`; });
            document.getElementById('inv-tbody').innerHTML = tbody;

            const element = document.getElementById('invoice-template');
            element.style.display = 'block';
            
            const opt = { margin: 0.5, filename: `Cortez_Bon_${userData.username}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' } };
            html2pdf().set(opt).from(element).save().then(() => { element.style.display = 'none'; });
        }

        // --- دوال الإدارة والتحكم ---
        async function deleteItem(id) { if(confirm("حذف المنتج؟")) await fetch(`/api/shop/delete-item/${id}`, { method:'DELETE', headers:{'Authorization': `Bearer ${userToken}`} }); }
        async function toggleStock(id) { await fetch(`/api/shop/toggle-stock/${id}`, { method:'PUT', headers:{'Authorization': `Bearer ${userToken}`} }); }
        async function editItem(id) {
            const item = shopData.find(i => i._id === id);
            const newName = prompt("الاسم:", item.name) || item.name;
            const newPrice = prompt("السعر:", item.price) || item.price;
            await fetch(`/api/shop/edit-item/${id}`, { method:'PUT', headers:{'Content-Type':'application/json', 'Authorization': `Bearer ${userToken}`}, body: JSON.stringify({name: newName, price: newPrice, image_url: item.image_url}) });
        }

        async function fetchOrders() {
            const res = await fetch('/api/shop/orders', { headers: { 'Authorization': `Bearer ${userToken}` } }); const orders = await res.json();
            let html = "";
            orders.forEach(o => {
                let itemsStr = o.items.map(i => `${i.item_name} (x${i.quantity})`).join(' + ');
                const actionBtn = o.status === 'Pending' ? `<button onclick="confirmPayment('${o._id}')" class="btn-warning">💵 تم الاستلام</button>` : `<span style="color:var(--primary);">✔️ مدفوع</span>`;
                const deleteBtn = userData.role === 'Don' ? `<button onclick="deleteOrderLog('${o._id}')" class="btn-danger" style="margin-right:10px;">🗑️ مسح اللوج</button>` : '';
                
                html += `<div style="background:#111; padding:10px; border:1px solid #333; margin-bottom:10px;">
                    <b>${o.username}</b> طلب: [ ${itemsStr} ] <br> 
                    <span style="color:gold">الإجمالي: ${o.total_price}$</span> | ${actionBtn} ${deleteBtn}
                </div>`;
            });
            document.getElementById('orders-list-container').innerHTML = html;
        }

        async function confirmPayment(id) { await fetch('/api/shop/confirm-payment', { method:'POST', headers:{'Content-Type':'application/json', 'Authorization': `Bearer ${userToken}`}, body: JSON.stringify({ order_id: id }) }); }
        async function deleteOrderLog(id) { if(confirm("بصفتك الدون، هل تريد مسح أثر هذه العملية؟")) await fetch(`/api/shop/delete-order/${id}`, { method:'DELETE', headers:{'Authorization': `Bearer ${userToken}`} }); }
        
        async function resetTreasury() { if(confirm("تحذير: سيتم تصفير أموال الخزينة. هل أنت متأكد؟")) await fetch('/api/treasury/reset', { method:'POST', headers:{'Authorization': `Bearer ${userToken}`} }); }
        async function fetchTreasury() { const res = await fetch('/api/treasury/balance', { headers:{'Authorization': `Bearer ${userToken}`} }); const data = await res.json(); document.getElementById('treasury-balance').innerText = data.balance; }

        socket.on('shopUpdated', fetchShopItems);
        socket.on('ordersUpdated', fetchOrders);
        socket.on('treasuryUpdated', fetchTreasury);

        // تشغيل مبدئي
        fetchShopItems(); 
        if(['Don', 'Business_Manager', 'Chef_Braquage'].includes(userData.role)) { fetchOrders(); fetchTreasury(); }
    </script>
</body>
</html>
